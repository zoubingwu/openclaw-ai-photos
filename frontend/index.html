<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Photos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', 'Helvetica', 'Arial', 'sans-serif'],
            },
            colors: {
              apple: {
                blue: '#007AFF',
                gray: '#F2F2F7',
                darkText: '#1C1C1E',
                lightText: '#8E8E93',
              },
            },
          },
        },
      };
    </script>
    <style>
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }

      ::-webkit-scrollbar-track {
        background: transparent;
      }

      ::-webkit-scrollbar-thumb {
        background: #d1d1d6;
        border-radius: 4px;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: #aeaeb2;
      }

      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }

      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: scale(0.95);
        }

        to {
          opacity: 1;
          transform: scale(1);
        }
      }

    </style>
  </head>
  <body class="bg-white text-apple-darkText h-screen flex overflow-hidden antialiased selection:bg-apple-blue selection:text-white">
    <aside class="w-64 bg-apple-gray/80 backdrop-blur-xl border-r border-gray-200 flex-shrink-0 hidden md:flex flex-col z-20">
      <div class="pt-8 pb-4 px-6">
        <h1 class="text-xl font-bold tracking-tight">Photos</h1>
      </div>

      <nav class="flex-1 px-3 space-y-1">
        <a href="#" class="flex items-center px-3 py-2 bg-gray-200/60 rounded-lg text-sm font-medium text-apple-blue transition-colors">
          <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
          </svg>
          Library
        </a>
      </nav>
    </aside>

    <main class="flex-1 min-h-0 flex flex-col relative h-full">
      <header class="sticky top-0 z-10 bg-white/70 backdrop-blur-md border-b border-gray-100 px-4 py-3 sm:px-6 flex flex-col sm:flex-row items-center justify-between gap-4">
        <div class="md:hidden w-full flex justify-between items-center">
          <h1 class="text-xl font-bold tracking-tight">Photos</h1>
          <button class="text-apple-blue">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
            </svg>
          </button>
        </div>

        <form id="searchForm" class="contents">
          <div class="relative w-full sm:max-w-md flex-1">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <svg class="h-4 w-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
              </svg>
            </div>
            <input type="text" id="searchInput" placeholder="Search captions, scenes, or tags..." class="block w-full pl-10 pr-3 py-1.5 border border-transparent rounded-lg leading-5 bg-gray-100 text-gray-900 placeholder-gray-500 focus:outline-none focus:bg-white focus:ring-2 focus:ring-apple-blue focus:border-transparent transition-all sm:text-sm" />
          </div>

          <div class="flex items-center gap-2 w-full sm:w-auto overflow-x-auto no-scrollbar">
            <select id="yearFilter" class="bg-gray-100 text-sm rounded-lg px-3 py-1.5 border-none text-gray-700 font-medium cursor-pointer outline-none focus:outline-none focus:ring-0 focus:shadow-none focus:bg-white">
              <option value="">All years</option>
              <option value="2026">2026</option>
              <option value="2025">2025</option>
              <option value="2024">2024</option>
              <option value="2023">2023</option>
            </select>
          </div>
        </form>
      </header>

      <div class="px-6 py-4 text-sm text-gray-500">
        <div id="resultCount">Loading library...</div>
      </div>

      <div class="px-6 -mt-2 pb-2">
        <div id="errorBanner" class="hidden rounded-2xl bg-red-50 px-4 py-3 text-sm text-red-600"></div>
      </div>

      <div id="scrollViewport" class="flex-1 min-h-0 overflow-y-auto px-4 sm:px-6 pb-20">
        <div id="topSpacer" style="height: 0;"></div>
        <div id="photoGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-1 sm:gap-4"></div>
        <div id="bottomSpacer" style="height: 0;"></div>
        <div id="scrollHint" class="hidden py-6 text-center text-xs uppercase tracking-[0.24em] text-gray-400">Keep scrolling to load more</div>

        <div id="emptyState" class="hidden flex-col items-center justify-center h-64 text-center">
          <svg class="w-16 h-16 text-gray-300 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
          </svg>
          <h3 class="text-lg font-medium text-gray-900">No matching photos</h3>
          <p class="text-gray-500 mt-1 text-sm">Try a shorter search or a year filter.</p>
        </div>
      </div>
    </main>

    <div id="lightbox" class="fixed inset-0 z-50 bg-black/90 backdrop-blur-lg hidden flex flex-col min-h-0 transition-opacity duration-300 opacity-0">
      <div class="flex justify-between items-center p-4 text-white z-10">
        <button id="closeLightbox" class="p-2 bg-white/10 hover:bg-white/20 rounded-full backdrop-blur transition">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
          </svg>
        </button>
        <button id="toggleInfo" class="p-2 bg-white/10 hover:bg-white/20 rounded-full backdrop-blur transition">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
          </svg>
        </button>
      </div>

      <div class="flex-1 min-h-0 flex overflow-hidden relative">
        <div class="flex-1 min-w-0 min-h-0 flex items-center justify-center p-4 sm:p-6">
          <img id="lightboxImg" src="" alt="" class="block w-auto h-auto max-w-full max-h-full object-contain drop-shadow-2xl rounded-sm" />
        </div>

        <div id="infoPanel" class="w-80 max-w-full min-h-0 bg-white/10 backdrop-blur-xl border-l border-white/10 text-white p-6 hidden flex-col gap-6 overflow-y-auto">
          <div>
            <h2 id="infoTitle" class="text-xl font-semibold mb-1">Photo title</h2>
            <p id="infoDate" class="text-gray-300 text-sm">-</p>
          </div>

          <div class="space-y-4">
            <div class="bg-white/10 rounded-xl p-4">
              <div class="flex items-center text-sm font-medium mb-2">
                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-2.2 0-4 1.8-4 4m4-4c2.2 0 4 1.8 4 4m-4-4v8m0 0h4m-4 0H8"></path>
                </svg>
                Scene
              </div>
              <p id="infoScene" class="text-gray-200">Loading...</p>
            </div>

            <div class="bg-white/10 rounded-xl p-4">
              <div class="flex items-center text-sm font-medium mb-2">
                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"></path>
                </svg>
                Tags
              </div>
              <div id="infoTags" class="flex flex-wrap gap-2 mt-2"></div>
            </div>

            <div class="bg-white/10 rounded-xl p-4 text-xs text-gray-300 space-y-2">
              <div class="flex justify-between gap-3"><span>Text in image</span><span id="infoText">-</span></div>
              <div class="flex justify-between gap-3"><span>Dimensions</span><span id="infoSize">-</span></div>
              <div class="flex justify-between gap-3"><span>Path</span><span id="infoPath" class="truncate text-right">-</span></div>
            </div>
          </div>

          <div class="flex gap-2">
            <button id="openOriginalBtn" class="flex-1 rounded-full bg-white text-gray-900 px-4 py-2 text-sm font-semibold hover:bg-gray-100 transition">Open original</button>
            <button id="copyPathBtn" class="rounded-full border border-white/20 px-4 py-2 text-sm font-semibold hover:bg-white/10 transition">Copy path</button>
          </div>
        </div>
      </div>
    </div>

    <script>
      const state = {
        page: 0,
        pageSize: 25,
        total: 0,
        hasMore: false,
        loadingSearch: false,
        loadingPage: false,
        items: [],
        selected: null,
        requestId: 0,
        virtual: {
          columns: 1,
          gap: 16,
          itemHeight: 220,
          overscanRows: 3,
          renderedStartRow: -1,
          renderedEndRow: -1,
          renderedTotalRows: -1,
          renderedColumns: -1,
        },
      };

      const scrollViewport = document.getElementById('scrollViewport');
      const topSpacer = document.getElementById('topSpacer');
      const bottomSpacer = document.getElementById('bottomSpacer');
      const photoGrid = document.getElementById('photoGrid');
      const searchInput = document.getElementById('searchInput');
      const yearFilter = document.getElementById('yearFilter');
      const resultCount = document.getElementById('resultCount');
      const emptyState = document.getElementById('emptyState');
      const errorBanner = document.getElementById('errorBanner');
      const scrollHint = document.getElementById('scrollHint');
      const lightbox = document.getElementById('lightbox');
      const lightboxImg = document.getElementById('lightboxImg');
      const closeLightbox = document.getElementById('closeLightbox');
      const toggleInfoBtn = document.getElementById('toggleInfo');
      const infoPanel = document.getElementById('infoPanel');
      const infoTitle = document.getElementById('infoTitle');
      const infoDate = document.getElementById('infoDate');
      const infoScene = document.getElementById('infoScene');
      const infoTags = document.getElementById('infoTags');
      const infoText = document.getElementById('infoText');
      const infoSize = document.getElementById('infoSize');
      const infoPath = document.getElementById('infoPath');
      const openOriginalBtn = document.getElementById('openOriginalBtn');
      const copyPathBtn = document.getElementById('copyPathBtn');

      document.getElementById('searchForm').addEventListener('submit', (event) => {
        event.preventDefault();
        runSearch(true);
      });
      searchInput.addEventListener('input', debounce(() => {
        runSearch(true);
      }, 220));
      yearFilter.addEventListener('change', () => {
        runSearch(true);
      });
      scrollViewport.addEventListener('scroll', onViewportScroll, { passive: true });
      window.addEventListener('resize', debounce(() => {
        recomputeVirtualMetrics();
        renderVisibleWindow();
        maybeLoadMore();
      }, 120));
      closeLightbox.addEventListener('click', closeLightboxHandler);
      toggleInfoBtn.addEventListener('click', () => {
        infoPanel.classList.toggle('hidden');
        infoPanel.classList.toggle('flex');
        toggleInfoBtn.classList.toggle('bg-apple-blue');
      });
      document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape' && !lightbox.classList.contains('hidden')) {
          closeLightboxHandler();
        }
      });
      openOriginalBtn.addEventListener('click', async () => {
        if (!state.selected) {
          return;
        }
        try {
          const response = await fetch(state.selected.open_url, { method: 'POST' });
          if (!response.ok) {
            showError('Unable to open the original file.');
          }
        } catch (error) {
          showError('Connection lost. Refresh the page and try again.');
        }
      });
      copyPathBtn.addEventListener('click', async () => {
        if (!state.selected?.file_path) {
          return;
        }
        await navigator.clipboard.writeText(state.selected.file_path);
      });

      async function boot() {
        await runSearch(true);
      }

      async function runSearch(reset) {
        clearError();
        state.loadingSearch = true;
        state.loadingPage = false;
        resultCount.textContent = 'Loading library...';
        state.requestId += 1;
        const requestId = state.requestId;

        if (reset) {
          state.page = 0;
          state.total = 0;
          state.hasMore = false;
          state.items = [];
          state.virtual.renderedStartRow = -1;
          state.virtual.renderedEndRow = -1;
          state.virtual.renderedTotalRows = -1;
          state.virtual.renderedColumns = -1;
          photoGrid.innerHTML = '';
          topSpacer.style.height = '0px';
          bottomSpacer.style.height = '0px';
          scrollViewport.scrollTop = 0;
          bottomSpacer.style.height = '0px';
        }

        const params = new URLSearchParams({
          page: '1',
          page_size: String(state.pageSize),
        });

        const textQuery = searchInput.value.trim();
        if (textQuery) {
          params.set('text', textQuery);
        }
        if (yearFilter.value) {
          params.set('date', yearFilter.value);
        }

        try {
          const response = await fetch(`/api/search?${params.toString()}`);
          const payload = await response.json();
          if (requestId !== state.requestId) {
            return;
          }
          if (!response.ok) {
            throw new Error(payload?.error?.message || 'Search failed');
          }
          state.loadingSearch = false;
          state.page = 1;
          state.total = payload.total || 0;
          state.hasMore = Boolean(payload.has_more);
          state.items = payload.items || [];
          recomputeVirtualMetrics();
          renderVisibleWindow();
          renderMeta();
          maybeLoadMore();
        } catch (error) {
          if (requestId !== state.requestId) {
            return;
          }
          state.loadingSearch = false;
          state.items = [];
          state.total = 0;
          state.hasMore = false;
          renderVisibleWindow();
          renderMeta();
          showError(error.message || 'Search failed');
        }
      }

      async function loadNextPage() {
        if (!state.hasMore || state.loadingPage) {
          return;
        }
        state.loadingPage = true;

        const params = buildQueryParams(state.page + 1);
        const requestId = state.requestId;

        try {
          const response = await fetch(`/api/search?${params.toString()}`);
          const payload = await response.json();
          if (requestId !== state.requestId) {
            return;
          }
          if (!response.ok) {
            throw new Error(payload?.error?.message || 'Failed to load more');
          }
          state.page += 1;
          state.total = payload.total || state.total;
          state.hasMore = Boolean(payload.has_more);
          state.items.push(...(payload.items || []));
          recomputeVirtualMetrics();
          renderVisibleWindow();
          renderMeta();
        } catch (error) {
          if (requestId === state.requestId) {
            showError(error.message || 'Failed to load more');
          }
        } finally {
          if (requestId === state.requestId) {
            state.loadingPage = false;
          }
        }
      }

      function buildQueryParams(page) {
        const params = new URLSearchParams({
          page: String(page),
          page_size: String(state.pageSize),
        });

        const textQuery = searchInput.value.trim();
        if (textQuery) {
          params.set('text', textQuery);
        }
        if (yearFilter.value) {
          params.set('date', yearFilter.value);
        }
        return params;
      }

      function renderVisibleWindow() {
        const photos = state.items;

        if (photos.length === 0) {
          state.virtual.renderedStartRow = -1;
          state.virtual.renderedEndRow = -1;
          state.virtual.renderedTotalRows = -1;
          state.virtual.renderedColumns = -1;
          photoGrid.replaceChildren();
          photoGrid.classList.add('hidden');
          emptyState.classList.remove('hidden');
          scrollHint.classList.add('hidden');
          return;
        }

        photoGrid.classList.remove('hidden');
        emptyState.classList.add('hidden');
        scrollHint.classList.toggle('hidden', !state.hasMore);

        const columns = state.virtual.columns;
        const rowStride = state.virtual.itemHeight + state.virtual.gap;
        const viewportHeight = scrollViewport.clientHeight || 1;
        const totalRows = Math.ceil(photos.length / columns);
        const startRow = Math.max(0, Math.floor(scrollViewport.scrollTop / rowStride) - state.virtual.overscanRows);
        const visibleRows = Math.ceil(viewportHeight / rowStride) + state.virtual.overscanRows * 2;
        const endRow = Math.min(totalRows, startRow + visibleRows);
        const startIndex = startRow * columns;
        const endIndex = Math.min(photos.length, endRow * columns);

        topSpacer.style.height = `${Math.max(0, startRow * rowStride)}px`;
        bottomSpacer.style.height = `${Math.max(0, (totalRows - endRow) * rowStride)}px`;

        if (
          state.virtual.renderedStartRow === startRow &&
          state.virtual.renderedEndRow === endRow &&
          state.virtual.renderedTotalRows === totalRows &&
          state.virtual.renderedColumns === columns
        ) {
          return;
        }

        state.virtual.renderedStartRow = startRow;
        state.virtual.renderedEndRow = endRow;
        state.virtual.renderedTotalRows = totalRows;
        state.virtual.renderedColumns = columns;

        const fragment = document.createDocumentFragment();
        photos.slice(startIndex, endIndex).forEach((photo, index) => {
          const card = document.createElement('button');
          card.type = 'button';
          card.className = 'group relative aspect-square overflow-hidden bg-gray-100 rounded-xl cursor-pointer shadow-sm hover:shadow-md transition-all duration-300 text-left';
          card.innerHTML = `
            <img src="${photo.thumb_url}" alt="${escapeHTML(photo.filename)}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105" loading="lazy">
            <div class="absolute inset-0 bg-gradient-to-t from-black/60 via-black/0 to-black/0 opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex flex-col justify-end p-3">
              <p class="text-white text-sm font-medium truncate">${escapeHTML(photo.filename)}</p>
              <p class="text-gray-200 text-xs truncate">${escapeHTML(formatDate(photo.taken_at))}</p>
            </div>
            <div class="absolute top-3 right-3 text-white opacity-0 group-hover:opacity-100 transition-opacity">
              <svg class="w-5 h-5 drop-shadow-md" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"></path>
              </svg>
            </div>
          `;
          card.addEventListener('click', () => openLightbox(photo.id));
          fragment.appendChild(card);
        });

        photoGrid.replaceChildren(fragment);
      }

      function recomputeVirtualMetrics() {
        const wasHidden = photoGrid.classList.contains('hidden');
        if (wasHidden) {
          photoGrid.classList.remove('hidden');
        }
        const style = window.getComputedStyle(photoGrid);
        const columns = Math.max(1, style.gridTemplateColumns.split(' ').filter(Boolean).length);
        const gap = Number.parseFloat(style.rowGap || style.gap || '16') || 16;
        const gridWidth = photoGrid.clientWidth || photoGrid.parentElement.clientWidth || scrollViewport.clientWidth;
        const itemWidth = Math.max(120, (gridWidth - gap * (columns - 1)) / columns);
        state.virtual.columns = columns;
        state.virtual.gap = gap;
        state.virtual.itemHeight = itemWidth;
        if (wasHidden && state.items.length === 0) {
          photoGrid.classList.add('hidden');
        }
      }

      function onViewportScroll() {
        window.requestAnimationFrame(() => {
          renderVisibleWindow();
          maybeLoadMore();
        });
      }

      function maybeLoadMore() {
        if (state.loadingSearch || !state.hasMore || state.loadingPage || state.items.length === 0) {
          return;
        }
        const threshold = state.virtual.itemHeight * 3;
        const remaining = scrollViewport.scrollHeight - scrollViewport.scrollTop - scrollViewport.clientHeight;
        if (remaining < threshold) {
          loadNextPage();
        }
      }

      async function openLightbox(photoId) {
        clearError();
        try {
          const response = await fetch(`/api/photos/${photoId}`);
          const photo = await response.json();
          if (!response.ok) {
            throw new Error(photo?.error?.message || 'Failed to load details');
          }
          state.selected = photo;
          infoTitle.textContent = photo.filename;
          infoDate.textContent = formatDate(photo.taken_at);
          infoScene.textContent = photo.scene || photo.caption || 'No extra description';
          infoText.textContent = photo.text_in_image || '-';
          infoSize.textContent = photo.width && photo.height ? `${photo.width} × ${photo.height}` : '-';
          infoPath.textContent = photo.file_path || '-';
          lightboxImg.src = photo.preview_url;
          lightboxImg.alt = photo.filename;
          openOriginalBtn.disabled = false;
          copyPathBtn.disabled = false;
          infoTags.innerHTML = (photo.tags || []).map((tag) => `<span class="px-2.5 py-1 bg-white/20 rounded-full text-xs text-white backdrop-blur-sm border border-white/10">${escapeHTML(tag)}</span>`).join('') || '<span class="text-sm text-gray-300">No tags</span>';
          lightbox.classList.remove('hidden');
          infoPanel.classList.remove('hidden');
          infoPanel.classList.add('flex');
          setTimeout(() => {
            lightbox.classList.remove('opacity-0');
          }, 10);
        } catch (error) {
          showError(error.message || 'Failed to load details');
        }
      }

      function closeLightboxHandler() {
        lightbox.classList.add('opacity-0');
        setTimeout(() => {
          lightbox.classList.add('hidden');
          lightboxImg.src = '';
        }, 300);
      }

      function renderMeta() {
        if (state.total === 0) {
          resultCount.textContent = 'No photos found';
        } else {
          resultCount.textContent = `${state.total} photos`;
        }
      }

      function showError(message) {
        errorBanner.textContent = message;
        errorBanner.classList.remove('hidden');
      }

      function clearError() {
        errorBanner.textContent = '';
        errorBanner.classList.add('hidden');
      }

      function formatDate(value) {
        if (!value) {
          return 'Unknown date';
        }
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) {
          return value;
        }
        return new Intl.DateTimeFormat('zh-CN', {
          dateStyle: 'medium',
          timeStyle: 'short',
        }).format(date);
      }

      function debounce(fn, wait) {
        let timer = null;
        return (...args) => {
          clearTimeout(timer);
          timer = setTimeout(() => fn(...args), wait);
        };
      }

      function escapeHTML(value) {
        return String(value)
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;');
      }

      boot();
    </script>
  </body>
</html>
