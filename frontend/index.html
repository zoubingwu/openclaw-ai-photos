<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Photos</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', 'Helvetica', 'Arial', 'sans-serif'],
          },
          colors: {
            apple: {
              blue: '#007AFF',
              gray: '#F2F2F7',
              darkText: '#1C1C1E',
              lightText: '#8E8E93',
            },
          },
        },
      },
    };
  </script>
  <style>
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #d1d1d6;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #aeaeb2;
    }

    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: scale(0.95);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }
  </style>
</head>

<body
  class="bg-white text-apple-darkText h-screen flex overflow-hidden antialiased selection:bg-apple-blue selection:text-white">
  <aside
    class="w-64 bg-apple-gray/80 backdrop-blur-xl border-r border-gray-200 flex-shrink-0 hidden md:flex flex-col z-20">
    <div class="pt-8 pb-4 px-6">
      <h1 class="text-xl font-bold tracking-tight">Photos</h1>
    </div>

    <nav class="flex-1 px-3 space-y-1">
      <a href="#"
        class="flex items-center px-3 py-2 bg-gray-200/60 rounded-lg text-sm font-medium text-apple-blue transition-colors">
        <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z">
          </path>
        </svg>
        Library
      </a>
    </nav>
  </aside>

  <main class="flex-1 min-h-0 flex flex-col relative h-full">
    <header
      class="sticky top-0 z-10 bg-white/70 backdrop-blur-md border-b border-gray-100 px-4 py-3 sm:px-6 flex flex-col sm:flex-row items-center justify-between gap-4">
      <div class="md:hidden w-full flex justify-between items-center">
        <h1 class="text-xl font-bold tracking-tight">Photos</h1>
        <button class="text-apple-blue">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
          </svg>
        </button>
      </div>

      <form id="searchForm" class="contents">
        <div class="relative w-full sm:max-w-md flex-1">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <svg class="h-4 w-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
            </svg>
          </div>
          <input type="text" id="searchInput" placeholder="Search captions, scenes, or tags..."
            class="block w-full pl-10 pr-3 py-1.5 border border-transparent rounded-lg leading-5 bg-gray-100 text-gray-900 placeholder-gray-500 focus:outline-none focus:bg-white focus:ring-2 focus:ring-apple-blue focus:border-transparent transition-all sm:text-sm" />
        </div>

        <div class="flex items-center gap-2 w-full sm:w-auto overflow-x-auto no-scrollbar">
          <select id="yearFilter"
            class="bg-gray-100 text-sm rounded-lg px-3 py-1.5 border-none text-gray-700 font-medium cursor-pointer outline-none focus:outline-none focus:ring-0 focus:shadow-none focus:bg-white">
            <option value="">All years</option>
            <option value="2026">2026</option>
            <option value="2025">2025</option>
            <option value="2024">2024</option>
            <option value="2023">2023</option>
          </select>
        </div>
      </form>
    </header>

    <div class="px-6 py-4 text-sm text-gray-500">
      <div id="resultCount"></div>
    </div>

    <div class="px-6 -mt-2 pb-2">
      <div id="errorBanner" class="hidden rounded-2xl bg-red-50 px-4 py-3 text-sm text-red-600"></div>
    </div>

    <!--
      DISABLE SCROLL ANCHORING:
      Prevents the browser's native scroll anchoring feature from aggressively
      adjusting scrollTop when topSpacer/bottomSpacer heights change dynamically,
      which causes infinite pagination loops and rubber-banding lag.
    -->
    <div id="scrollViewport" class="flex-1 min-h-0 overflow-y-auto px-4 sm:px-6 pb-20" style="overflow-anchor: none;">
      <div id="topSpacer" style="height: 0;"></div>
      <div id="photoGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-1 sm:gap-4"></div>
      <div id="bottomSpacer" style="height: 0;"></div>
      <div id="scrollHint" class="hidden py-6 text-center text-xs uppercase tracking-[0.24em] text-gray-400">Keep
        scrolling to load more</div>
      <div id="loadingMore" class="hidden items-center justify-center gap-3 py-6 text-sm text-gray-500">
        <span class="inline-block h-4 w-4 animate-spin rounded-full border-2 border-gray-300 border-t-gray-700"></span>
        <span>Loading more photos...</span>
      </div>
      <div id="searchLoadingState" class="hidden h-40 items-center justify-center gap-3 text-sm text-gray-500">
        <span class="inline-block h-5 w-5 animate-spin rounded-full border-2 border-gray-300 border-t-gray-700"></span>
        <span id="searchLoadingText">Searching photos...</span>
      </div>

      <div id="emptyState" class="hidden h-64 flex-col items-center justify-center text-center">
        <h3 class="text-lg font-medium text-gray-900">No matching photos</h3>
        <p class="text-gray-500 mt-1 text-sm">Try a shorter search or a year filter.</p>
      </div>
    </div>
  </main>

  <div id="lightbox"
    class="fixed inset-0 z-50 bg-black/90 backdrop-blur-lg hidden flex flex-col min-h-0 transition-opacity duration-300 opacity-0">
    <div class="flex justify-between items-center p-4 text-white z-10">
      <button id="closeLightbox" class="p-2 bg-white/10 hover:bg-white/20 rounded-full backdrop-blur transition">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
        </svg>
      </button>
      <button id="toggleInfo" class="p-2 bg-white/10 hover:bg-white/20 rounded-full backdrop-blur transition">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
        </svg>
      </button>
    </div>

    <div class="flex-1 min-h-0 flex overflow-hidden relative">
      <div class="flex-1 min-w-0 min-h-0 flex items-center justify-center p-4 sm:p-6">
        <img id="lightboxImg" src="" alt=""
          class="block w-auto h-auto max-w-full max-h-full object-contain drop-shadow-2xl rounded-sm" />
      </div>

      <div id="infoPanel"
        class="w-80 max-w-full min-h-0 bg-white/10 backdrop-blur-xl border-l border-white/10 text-white p-6 hidden flex-col gap-6 overflow-y-auto">
        <div>
          <h2 id="infoTitle" class="text-xl font-semibold mb-1">Photo title</h2>
          <p id="infoDate" class="text-gray-300 text-sm">-</p>
        </div>

        <div class="space-y-4">
          <div class="bg-white/10 rounded-xl p-4">
            <div class="flex items-center text-sm font-medium mb-2">
              <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M12 8c-2.2 0-4 1.8-4 4m4-4c2.2 0 4 1.8 4 4m-4-4v8m0 0h4m-4 0H8"></path>
              </svg>
              Scene
            </div>
            <p id="infoScene" class="text-gray-100">Loading...</p>
            <p id="infoCaption" class="hidden mt-3 text-sm leading-6 text-gray-300"></p>
          </div>

          <div class="bg-white/10 rounded-xl p-4">
            <div class="flex items-center text-sm font-medium mb-2">
              <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z">
                </path>
              </svg>
              Tags
            </div>
            <div id="infoTags" class="flex flex-wrap gap-2 mt-2"></div>
          </div>

          <div id="captureCard" class="hidden bg-white/10 rounded-xl p-4">
            <div class="flex items-center text-sm font-medium mb-2">
              <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M4 7h3l2-3h6l2 3h3v12a2 2 0 01-2 2H6a2 2 0 01-2-2V7z"></path>
                <circle cx="12" cy="13" r="3"></circle>
              </svg>
              Capture
            </div>
            <div id="infoCapture" class="space-y-2 text-xs text-gray-300"></div>
          </div>

          <div class="bg-white/10 rounded-xl p-4">
            <div class="flex items-center text-sm font-medium mb-2">
              <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M9 12h6m-6 4h6M7 4h10a2 2 0 012 2v12a2 2 0 01-2 2H7a2 2 0 01-2-2V6a2 2 0 012-2z"></path>
              </svg>
              File
            </div>
            <div id="infoFile" class="space-y-2 text-xs text-gray-300"></div>
          </div>
        </div>

        <div class="flex gap-2">
          <button id="openOriginalBtn"
            class="flex-1 rounded-full bg-white text-gray-900 px-4 py-2 text-sm font-semibold hover:bg-gray-100 transition">Open
            original</button>
          <button id="copyPathBtn"
            class="rounded-full border border-white/20 px-4 py-2 text-sm font-semibold hover:bg-white/10 transition">Copy
            path</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const state = {
      page: 0,
      pageSize: 25,
      total: 0,
      hasMore: false,
      loadingSearch: false,
      loadingPage: false,
      items: [],
      selected: null,
      requestId: 0,
      virtual: {
        columns: 1,
        gap: 16,
        itemHeight: 220,
        overscanRows: 3,
        renderedStartRow: -1,
        renderedEndRow: -1,
        renderedTotalRows: -1,
        renderedColumns: -1,
      },
    };

    const scrollViewport = document.getElementById('scrollViewport');
    const topSpacer = document.getElementById('topSpacer');
    const bottomSpacer = document.getElementById('bottomSpacer');
    const photoGrid = document.getElementById('photoGrid');
    const searchInput = document.getElementById('searchInput');
    const yearFilter = document.getElementById('yearFilter');
    const resultCount = document.getElementById('resultCount');
    const emptyState = document.getElementById('emptyState');
    const errorBanner = document.getElementById('errorBanner');
    const scrollHint = document.getElementById('scrollHint');
    const loadingMore = document.getElementById('loadingMore');
    const searchLoadingState = document.getElementById('searchLoadingState');
    const searchLoadingText = document.getElementById('searchLoadingText');
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightboxImg');
    const closeLightbox = document.getElementById('closeLightbox');
    const toggleInfoBtn = document.getElementById('toggleInfo');
    const infoPanel = document.getElementById('infoPanel');
    const infoTitle = document.getElementById('infoTitle');
    const infoDate = document.getElementById('infoDate');
    const infoScene = document.getElementById('infoScene');
    const infoCaption = document.getElementById('infoCaption');
    const infoTags = document.getElementById('infoTags');
    const captureCard = document.getElementById('captureCard');
    const infoCapture = document.getElementById('infoCapture');
    const infoFile = document.getElementById('infoFile');
    const openOriginalBtn = document.getElementById('openOriginalBtn');
    const copyPathBtn = document.getElementById('copyPathBtn');

    document.getElementById('searchForm').addEventListener('submit', (event) => {
      event.preventDefault();
      runSearch(true);
    });
    searchInput.addEventListener('input', debounce(() => {
      runSearch(true);
    }, 220));
    yearFilter.addEventListener('change', () => {
      runSearch(true);
    });
    scrollViewport.addEventListener('scroll', onViewportScroll, { passive: true });
    window.addEventListener('resize', debounce(() => {
      recomputeVirtualMetrics();
      renderVisibleWindow();
      maybeLoadMore();
    }, 120));
    closeLightbox.addEventListener('click', closeLightboxHandler);
    toggleInfoBtn.addEventListener('click', () => {
      infoPanel.classList.toggle('hidden');
      infoPanel.classList.toggle('flex');
      toggleInfoBtn.classList.toggle('bg-apple-blue');
    });
    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape' && !lightbox.classList.contains('hidden')) {
        closeLightboxHandler();
      }
    });
    openOriginalBtn.addEventListener('click', async () => {
      if (!state.selected) {
        return;
      }
      try {
        const response = await fetch(state.selected.open_url, { method: 'POST' });
        if (!response.ok) {
          showError('Unable to open the original file.');
        }
      } catch (error) {
        showError('Connection lost. Refresh the page and try again.');
      }
    });
    copyPathBtn.addEventListener('click', async () => {
      if (!state.selected?.file_path) {
        return;
      }
      await navigator.clipboard.writeText(state.selected.file_path);
    });

    async function boot() {
      await runSearch(true);
    }

    async function runSearch(reset) {
      clearError();
      state.loadingSearch = true;
      state.loadingPage = false;
      resultCount.textContent = '';
      renderPagingState();
      state.requestId += 1;
      const requestId = state.requestId;

      if (reset) {
        state.page = 0;
        state.total = 0;
        state.hasMore = false;
        state.items = [];
        state.virtual.renderedStartRow = -1;
        state.virtual.renderedEndRow = -1;
        state.virtual.renderedTotalRows = -1;
        state.virtual.renderedColumns = -1;
        photoGrid.innerHTML = '';
        topSpacer.style.height = '0px';
        bottomSpacer.style.height = '0px';
        scrollViewport.scrollTop = 0;
        bottomSpacer.style.height = '0px';
        renderVisibleWindow();
      }

      const params = new URLSearchParams({
        page: '1',
        page_size: String(state.pageSize),
      });

      const textQuery = searchInput.value.trim();
      if (textQuery) {
        params.set('text', textQuery);
      }
      if (yearFilter.value) {
        params.set('date', yearFilter.value);
      }

      try {
        const response = await fetch(`/api/search?${params.toString()}`);
        const payload = await response.json();
        if (requestId !== state.requestId) {
          return;
        }
        if (!response.ok) {
          throw new Error(payload?.error?.message || 'Search failed');
        }
        state.loadingSearch = false;
        state.page = 1;
        state.total = payload.total || 0;
        state.hasMore = Boolean(payload.has_more);
        state.items = payload.items || [];
        recomputeVirtualMetrics();
        renderVisibleWindow();
        renderMeta();
        renderPagingState();
        maybeLoadMore();
      } catch (error) {
        if (requestId !== state.requestId) {
          return;
        }
        state.loadingSearch = false;
        state.items = [];
        state.total = 0;
        state.hasMore = false;
        renderVisibleWindow();
        renderMeta();
        renderPagingState();
        showError(error.message || 'Search failed');
      }
    }

    async function loadNextPage() {
      if (!state.hasMore || state.loadingPage) {
        return;
      }
      state.loadingPage = true;
      renderPagingState();

      const params = buildQueryParams(state.page + 1);
      const requestId = state.requestId;

      try {
        const response = await fetch(`/api/search?${params.toString()}`);
        const payload = await response.json();
        if (requestId !== state.requestId) {
          return;
        }
        if (!response.ok) {
          throw new Error(payload?.error?.message || 'Failed to load more');
        }
        state.page += 1;
        state.total = payload.total || state.total;
        state.hasMore = Boolean(payload.has_more);
        state.items.push(...(payload.items || []));
        recomputeVirtualMetrics();
        renderVisibleWindow();
        renderMeta();
        renderPagingState();
      } catch (error) {
        if (requestId === state.requestId) {
          showError(error.message || 'Failed to load more');
        }
      } finally {
        if (requestId === state.requestId) {
          state.loadingPage = false;
          renderPagingState();
        }
      }
    }

    function buildQueryParams(page) {
      const params = new URLSearchParams({
        page: String(page),
        page_size: String(state.pageSize),
      });

      const textQuery = searchInput.value.trim();
      if (textQuery) {
        params.set('text', textQuery);
      }
      if (yearFilter.value) {
        params.set('date', yearFilter.value);
      }
      return params;
    }

    function renderVisibleWindow() {
      const photos = state.items;

      if (state.loadingSearch) {
        state.virtual.renderedStartRow = -1;
        state.virtual.renderedEndRow = -1;
        state.virtual.renderedTotalRows = -1;
        state.virtual.renderedColumns = -1;
        photoGrid.replaceChildren();
        photoGrid.classList.add('hidden');
        topSpacer.style.height = '0px';
        bottomSpacer.style.height = '0px';
        emptyState.classList.add('hidden');
        emptyState.classList.remove('flex');
        searchLoadingText.textContent = hasActiveSearch() ? 'Searching photos...' : 'Loading library...';
        searchLoadingState.classList.remove('hidden');
        searchLoadingState.classList.add('flex');
        renderPagingState();
        return;
      }

      searchLoadingState.classList.add('hidden');
      searchLoadingState.classList.remove('flex');

      if (photos.length === 0) {
        state.virtual.renderedStartRow = -1;
        state.virtual.renderedEndRow = -1;
        state.virtual.renderedTotalRows = -1;
        state.virtual.renderedColumns = -1;
        photoGrid.replaceChildren();
        photoGrid.classList.add('hidden');
        emptyState.classList.remove('hidden');
        emptyState.classList.add('flex');
        renderPagingState();
        return;
      }

      photoGrid.classList.remove('hidden');
      emptyState.classList.add('hidden');
      emptyState.classList.remove('flex');
      renderPagingState();

      const columns = state.virtual.columns;
      const rowStride = state.virtual.itemHeight + state.virtual.gap;
      const viewportHeight = scrollViewport.clientHeight || 1;
      const totalRows = Math.ceil(photos.length / columns);
      const startRow = Math.max(0, Math.floor(scrollViewport.scrollTop / rowStride) - state.virtual.overscanRows);
      const visibleRows = Math.ceil(viewportHeight / rowStride) + state.virtual.overscanRows * 2;
      const endRow = Math.min(totalRows, startRow + visibleRows);
      const startIndex = startRow * columns;
      const endIndex = Math.min(photos.length, endRow * columns);

      topSpacer.style.height = `${Math.max(0, startRow * rowStride)}px`;
      bottomSpacer.style.height = `${Math.max(0, (totalRows - endRow) * rowStride)}px`;

      if (
        state.virtual.renderedStartRow === startRow &&
        state.virtual.renderedEndRow === endRow &&
        state.virtual.renderedTotalRows === totalRows &&
        state.virtual.renderedColumns === columns
      ) {
        return;
      }

      state.virtual.renderedStartRow = startRow;
      state.virtual.renderedEndRow = endRow;
      state.virtual.renderedTotalRows = totalRows;
      state.virtual.renderedColumns = columns;

      const fragment = document.createDocumentFragment();
      photos.slice(startIndex, endIndex).forEach((photo, index) => {
        const card = document.createElement('button');
        card.type = 'button';
        card.className = 'group relative aspect-square overflow-hidden bg-gray-100 rounded-xl cursor-pointer shadow-sm hover:shadow-md transition-all duration-300 text-left';
        card.innerHTML = `
            <img src="${photo.thumb_url}" alt="${escapeHTML(photo.filename)}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105" loading="lazy">
            <div class="absolute inset-0 bg-gradient-to-t from-black/60 via-black/0 to-black/0 opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex flex-col justify-end p-3">
              <p class="text-white text-sm font-medium truncate">${escapeHTML(photo.filename)}</p>
              <p class="text-gray-200 text-xs truncate">${escapeHTML(formatDate(photo.taken_at))}</p>
            </div>
            <div class="absolute top-3 right-3 text-white opacity-0 group-hover:opacity-100 transition-opacity">
              <svg class="w-5 h-5 drop-shadow-md" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"></path>
              </svg>
            </div>
          `;
        card.addEventListener('click', () => openLightbox(photo));
        fragment.appendChild(card);
      });

      photoGrid.replaceChildren(fragment);
    }

    function recomputeVirtualMetrics() {
      const wasHidden = photoGrid.classList.contains('hidden');
      if (wasHidden) {
        photoGrid.classList.remove('hidden');
      }
      const style = window.getComputedStyle(photoGrid);
      const columns = Math.max(1, style.gridTemplateColumns.split(' ').filter(Boolean).length);
      const gap = Number.parseFloat(style.rowGap || style.gap || '16') || 16;
      const gridWidth = photoGrid.clientWidth || photoGrid.parentElement.clientWidth || scrollViewport.clientWidth;
      const itemWidth = Math.max(120, (gridWidth - gap * (columns - 1)) / columns);
      state.virtual.columns = columns;
      state.virtual.gap = gap;
      state.virtual.itemHeight = itemWidth;
      if (wasHidden && state.items.length === 0) {
        photoGrid.classList.add('hidden');
      }
    }

    let isScrollTicking = false;

    function onViewportScroll() {
      if (!isScrollTicking) {
        window.requestAnimationFrame(() => {
          renderVisibleWindow();
          maybeLoadMore();
          isScrollTicking = false;
        });
        isScrollTicking = true;
      }
    }

    function maybeLoadMore() {
      if (state.loadingSearch || !state.hasMore || state.loadingPage || state.items.length === 0) {
        return;
      }
      const threshold = state.virtual.itemHeight * 3;
      const remaining = scrollViewport.scrollHeight - scrollViewport.scrollTop - scrollViewport.clientHeight;
      if (remaining < threshold) {
        loadNextPage();
      }
    }

    function openLightbox(photo) {
      clearError();
      state.selected = photo;
      const exif = photo.exif || {};
      const deviceName = formatDeviceName(exif);
      const locationLabel = formatLocation(exif);
      const orientationLabel = formatOrientation(exif.orientation);
      const captureRows = [
        buildInfoRow('Device', deviceName),
        buildInfoRow('Location', locationLabel),
        buildInfoRow('Orientation', orientationLabel),
      ].filter(Boolean);
      const fileRows = [
        buildInfoRow('MIME type', photo.mime_type || ''),
        buildInfoRow('Dimensions', photo.width && photo.height ? `${photo.width} x ${photo.height}` : ''),
        buildInfoRow('Text in image', photo.text_in_image || ''),
        buildInfoRow('Path', photo.file_path || '', true),
      ].filter(Boolean);

      infoTitle.textContent = photo.filename;
      infoDate.textContent = formatDate(photo.taken_at);
      infoScene.textContent = photo.scene || photo.caption || 'No extra description';
      infoCaption.textContent = photo.caption || '';
      infoCaption.classList.toggle('hidden', !photo.caption || photo.caption === photo.scene);
      captureCard.classList.toggle('hidden', captureRows.length === 0);
      infoCapture.innerHTML = captureRows.join('');
      infoFile.innerHTML = fileRows.join('');
      lightboxImg.src = photo.preview_url;
      lightboxImg.alt = photo.filename;
      openOriginalBtn.disabled = false;
      copyPathBtn.disabled = false;
      infoTags.innerHTML = (photo.tags || []).map((tag) => `<span class="px-2.5 py-1 bg-white/20 rounded-full text-xs text-white backdrop-blur-sm border border-white/10">${escapeHTML(tag)}</span>`).join('') || '<span class="text-sm text-gray-300">No tags</span>';
      lightbox.classList.remove('hidden');
      infoPanel.classList.remove('hidden');
      infoPanel.classList.add('flex');
      setTimeout(() => {
        lightbox.classList.remove('opacity-0');
      }, 10);
    }

    function closeLightboxHandler() {
      lightbox.classList.add('opacity-0');
      setTimeout(() => {
        lightbox.classList.add('hidden');
        lightboxImg.src = '';
      }, 300);
    }

    function renderMeta() {
      if (state.total === 0) {
        resultCount.textContent = '';
      } else {
        resultCount.textContent = `${state.total} photos`;
      }
    }

    function hasActiveSearch() {
      return searchInput.value.trim() !== '' || yearFilter.value !== '';
    }

    function renderPagingState() {
      const showLoading = state.loadingPage && state.items.length > 0;
      const showHint = !state.loadingSearch && !state.loadingPage && state.hasMore && state.items.length > 0;
      loadingMore.classList.toggle('hidden', !showLoading);
      loadingMore.classList.toggle('flex', showLoading);
      scrollHint.classList.toggle('hidden', !showHint);
    }

    function showError(message) {
      errorBanner.textContent = message;
      errorBanner.classList.remove('hidden');
    }

    function clearError() {
      errorBanner.textContent = '';
      errorBanner.classList.add('hidden');
    }

    function formatDate(value) {
      if (!value) {
        return 'Unknown date';
      }
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) {
        return value;
      }
      return new Intl.DateTimeFormat('zh-CN', {
        dateStyle: 'medium',
        timeStyle: 'short',
      }).format(date);
    }

    function buildInfoRow(label, value, multiline = false) {
      if (!value) {
        return '';
      }
      const valueClass = multiline ? 'text-right break-all text-gray-100' : 'text-right text-gray-100';
      return `
        <div class="flex items-start justify-between gap-3">
          <span class="text-gray-400">${escapeHTML(label)}</span>
          <span class="${valueClass}">${escapeHTML(value)}</span>
        </div>
      `;
    }

    function formatDeviceName(exif) {
      const make = cleanMetadataText(exif.device_make);
      const model = cleanMetadataText(exif.device_model);
      if (make && model) {
        if (model.toLowerCase().startsWith(make.toLowerCase())) {
          return model;
        }
        return `${make} ${model}`;
      }
      return make || model || '';
    }

    function formatLocation(exif) {
      const latitude = Number(exif.latitude);
      const longitude = Number(exif.longitude);
      if (!Number.isFinite(latitude) || !Number.isFinite(longitude)) {
        return '';
      }
      return `${latitude.toFixed(5)}, ${longitude.toFixed(5)}`;
    }

    function formatOrientation(value) {
      const orientation = Number(value);
      if (!Number.isFinite(orientation)) {
        return '';
      }
      switch (orientation) {
        case 0:
        case 1:
          return 'Normal';
        case 3:
          return 'Rotate 180';
        case 6:
          return 'Rotate 90';
        case 8:
          return 'Rotate 270';
        default:
          return `Orientation ${orientation}`;
      }
    }

    function cleanMetadataText(value) {
      if (typeof value !== 'string') {
        return '';
      }
      return value.trim();
    }

    function debounce(fn, wait) {
      let timer = null;
      return (...args) => {
        clearTimeout(timer);
        timer = setTimeout(() => fn(...args), wait);
      };
    }

    function escapeHTML(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;');
    }

    boot();
  </script>
</body>

</html>
