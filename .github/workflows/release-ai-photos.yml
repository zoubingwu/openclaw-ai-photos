name: release-ai-photos

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version tag, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

env:
  GO111MODULE: on

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - name: Resolve release version
        id: version
        shell: bash
        run: |
          version="${GITHUB_REF_NAME}"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            version="${{ inputs.version }}"
          fi

          case "${version}" in
            v*)
              ;;
            *)
              echo "release version must start with v"
              exit 1
              ;;
          esac

          echo "value=${version}" >> "${GITHUB_OUTPUT}"

  verify:
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Run tests
        run: go test ./...

  build:
    runs-on: ubuntu-latest
    needs:
      - prepare
      - verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Build archive
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        shell: bash
        run: |
          binary_base="ai-photos"
          binary_name="${binary_base}"
          versioned_archive_name="${binary_base}_${VERSION}_${GOOS}_${GOARCH}.tar.gz"
          stable_archive_name="${binary_base}_${GOOS}_${GOARCH}.tar.gz"
          package_dir="${RUNNER_TEMP}/${GOOS}-${GOARCH}"

          if [ "${GOOS}" = "windows" ]; then
            binary_name="${binary_base}.exe"
            versioned_archive_name="${binary_base}_${VERSION}_${GOOS}_${GOARCH}.zip"
            stable_archive_name="${binary_base}_${GOOS}_${GOARCH}.zip"
          fi

          rm -rf "${package_dir}"
          mkdir -p "${package_dir}" dist

          GOOS="${GOOS}" GOARCH="${GOARCH}" CGO_ENABLED=0 \
            go build -trimpath -ldflags="-s -w" -o "${package_dir}/${binary_name}" ./cmd/ai-photos

          if [ "${GOOS}" = "windows" ]; then
            (
              cd "${package_dir}"
              zip -q "${RUNNER_TEMP}/${versioned_archive_name}" "${binary_name}"
            )
            mv "${RUNNER_TEMP}/${versioned_archive_name}" "dist/${versioned_archive_name}"
          else
            tar -C "${package_dir}" -czf "dist/${versioned_archive_name}" "${binary_name}"
          fi

          cp "dist/${versioned_archive_name}" "dist/${stable_archive_name}"

      - name: Upload packaged binary
        uses: actions/upload-artifact@v6
        with:
          name: ai-photos-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build
    steps:
      - name: Download packaged binaries
        uses: actions/download-artifact@v5
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          VERSION: ${{ needs.prepare.outputs.version }}
        shell: bash
        run: |
          shopt -s nullglob
          assets=(release-assets/*)

          if [ "${#assets[@]}" -eq 0 ]; then
            echo "no release assets found"
            exit 1
          fi

          if gh release view "${VERSION}" >/dev/null 2>&1; then
            gh release upload "${VERSION}" "${assets[@]}" --clobber
          else
            gh release create "${VERSION}" "${assets[@]}" \
              --title "${VERSION}" \
              --target "${GITHUB_SHA}" \
              --verify-tag \
              --generate-notes
          fi
