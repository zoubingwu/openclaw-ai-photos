name: release-ai-photos

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version tag, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

env:
  GO111MODULE: on

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - name: Resolve release version
        id: version
        shell: bash
        run: |
          version="${GITHUB_REF_NAME}"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            version="${{ inputs.version }}"
          fi

          case "${version}" in
            v*)
              ;;
            *)
              echo "release version must start with v"
              exit 1
              ;;
          esac

          echo "value=${version}" >> "${GITHUB_OUTPUT}"

  verify:
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

  build:
    runs-on: ubuntu-latest
    needs:
      - prepare
      - verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build archive
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        shell: bash
        run: |
          binary_base="ai-photos"
          binary_name="${binary_base}"
          archive_name="${binary_base}_${VERSION}_${GOOS}_${GOARCH}.tar.gz"
          package_dir="${RUNNER_TEMP}/${GOOS}-${GOARCH}"

          if [ "${GOOS}" = "windows" ]; then
            binary_name="${binary_base}.exe"
            archive_name="${binary_base}_${VERSION}_${GOOS}_${GOARCH}.zip"
          fi

          rm -rf "${package_dir}"
          mkdir -p "${package_dir}" dist

          GOOS="${GOOS}" GOARCH="${GOARCH}" CGO_ENABLED=0 \
            go build -trimpath -ldflags="-s -w" -o "${package_dir}/${binary_name}" ./cmd/ai-photos

          if [ "${GOOS}" = "windows" ]; then
            (
              cd "${package_dir}"
              zip -q "${RUNNER_TEMP}/${archive_name}" "${binary_name}"
            )
            mv "${RUNNER_TEMP}/${archive_name}" "dist/${archive_name}"
          else
            tar -C "${package_dir}" -czf "dist/${archive_name}" "${binary_name}"
          fi

      - name: Upload packaged binary
        uses: actions/upload-artifact@v4
        with:
          name: ai-photos-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build
    steps:
      - name: Download packaged binaries
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.version }}
          name: ${{ needs.prepare.outputs.version }}
          target_commitish: ${{ github.sha }}
          files: release-assets/*
          fail_on_unmatched_files: true
          generate_release_notes: true
          overwrite_files: true
